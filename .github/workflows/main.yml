name: Instagram Auto-Reply Bot

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:
    inputs:
      post_url:
        description: 'Instagram Post/Reel URL'
        required: false
        type: string
      keyword:
        description: 'Trigger Keyword'
        required: false
        type: string
      reply_text:
        description: 'Reply Text'
        required: false
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run agent.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          INPUT_POST_URL: ${{ github.event.inputs.post_url }}
          INPUT_KEYWORD: ${{ github.event.inputs.keyword }}
          INPUT_REPLY: ${{ github.event.inputs.reply_text }}
        run: python agent.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add files if they exist/were created
          git add rules.json processed_comments.json || true
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update bot state [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
